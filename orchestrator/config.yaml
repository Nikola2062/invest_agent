# Orchestrator config — drives the unified daily digest (Mode A) and the
# two-way on-demand Telegram bot (Mode B). The three projects are driven in
# place; nothing here modifies them. All subprocesses use the SINGLE shared
# interpreter at the repo-root .venv (see settings.project_python).

projects:
  macro_risk:                       # risk_analysis — macro crash-risk gate
    dir: risk_analysis              # relative to investor_agent/
    reports_glob: "reports/*.json"
    runner: _macro_runner.py        # lives in orchestrator/; calls build_report()
  rotation:                         # capital_rotation_analysier — regime / flow
    dir: capital_rotation_analysier
    duckdb: data/rotation.duckdb
    daily_cmd: ["-m", "rotation.cli", "daily"]   # run with PYTHONPATH=src
  stocks:                           # stock_analysier — single-name deep dive
    dir: stock_analysier
    audit_db: data/audit.sqlite
    runner: _stock_runner.py        # lives in orchestrator/

# POSITIONS: held + watchlist are read directly from stock_analysier's own
# config — config/portfolio.yaml (holdings) and config/universe.yaml (watchlist).
# Edit those files; the orchestrator has no separate book and never overwrites them.

# Headline symbols surfaced in the "what changed" block (must exist in
# rotation.duckdb raw_bars / metrics_daily). US uses metrics_daily; HK is
# computed from raw_bars (HK is excluded from the NYSE-aligned signal panel).
market_view:
  us_indices: [SPY, QQQ, IWM]       # S&P500 / Nasdaq100 / Russell2000 proxies
  hk_indices: ["2800.HK"]           # Tracker Fund (HSI proxy)
  top_signals: 4                    # how many strongest signals to show

# D1 rules: how the macro gate + regime overlay onto each stock's own verdict.
# This is a POST-HOC overlay computed in the orchestrator; the projects' own
# verdicts are never altered.
rules:
  danger_macro_levels: [HIGH, CRITICAL]
  risk_off_regimes: ["Risk-Off Defensive", "Deflationary Shock", "Regime Uncertain"]
  # Tactical ladder order (low -> high severity). "" == no tactical action.
  tactical_ladder: ["", YELLOW_WATCH, ORANGE_TRIM, RED_DEFENSIVE, BLACK_EXIT]
  on_danger:
    block_new_entries: true         # downgrade BUY_NOW/WAIT_FOR_PRICE to HOLD_OFF
    escalate_tactical_one_notch: true   # bump held positions one rung stricter
  on_calm:
    block_new_entries: false

telegram:
  enabled: true
  allowlist_chat_ids: []            # only these chat ids may trigger Mode B; empty => use env TELEGRAM_CHAT_ID
  cooldown_seconds: 120             # min seconds between on-demand reports per chat
  daily_cap: 50                     # max on-demand reports per chat per day
  poll_timeout_seconds: 50          # long-poll getUpdates timeout

schedule:
  # The unified digest is pushed 1 HOUR BEFORE each market opens. Each run fires
  # in its OWN timezone (DST handled automatically via zoneinfo). Used only with
  # the --schedule flag; without it, main.py builds once and exits.
  # `calendar` (pandas-market-calendars) makes firing HOLIDAY-aware: a run is
  # skipped when its exchange is closed that day (weekends AND holidays).
  weekdays_only: true               # fallback if a run has no calendar / it fails to load
  runs:
    - {label: "HK pre-open", time: "08:30", timezone: "Asia/Hong_Kong", calendar: "XHKG"}    # HKEX opens 09:30 HKT
    - {label: "US pre-open", time: "08:30", timezone: "America/New_York", calendar: "XNYS"}  # NYSE/Nasdaq open 09:30 ET

output:
  reports_dir: reports              # orchestrator/reports/<date>_digest[.zh].md
  languages: [en, zh]               # render+push the compact digest in each (zh = 繁體中文)
  translate_full_report: true       # also translate the FULL report to 繁體中文

# How the FULL report / on-demand /hk replies are translated to 繁體中文 (DeepSeek).
translation:
  deepseek_model: deepseek-chat
